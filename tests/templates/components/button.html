{# Test: Components - Button Component #}
{%-- atom: @props(text:String, type:String="primary", disabled:Boolean=false) --%}
<button class="btn btn-{{ type }}{% if disabled %} disabled{% endif %}">
    {% if $slots.icon %}
        {{ $slots.icon() }}
    {% endif %}
    {{ text }}
</button>
